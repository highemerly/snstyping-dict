name: Validate

on:
  pull_request:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Validate dictionaries and ghosts
        run: node scripts/validate.mjs
      - name: Build catalog (dry run)
        run: node scripts/build-catalog.mjs /tmp/_catalog
